---
features:
  - |
    `lapdog claude` now auto-installs the `lapdog` Claude Code plugin from the
    in-repo marketplace if it is not already installed (runs
    `claude plugin marketplace add DataDog/dd-apm-test-agent` and
    `claude plugin install lapdog@lapdog`). Detection is via
    `~/.claude/plugins/installed_plugins.json`, so already-installed users pay
    no overhead. Skip the auto-install with `--no-plugin-install`. The
    explicit `--hooks` legacy path also skips auto-install. Install failures
    print the manual commands and continue launching Claude uninstrumented
    rather than blocking the session.
