---
fixes:
  - |
    Use ``time.time_ns()`` instead of ``int(time.time() * 1_000_000_000)`` for
    nanosecond timestamps in ``claude_hooks``, ``pi_hooks``, ``claude_proxy``,
    and ``llmobs_event_platform``. The float-based conversion lost precision
    (only ~1ms effective resolution due to IEEE 754 double rounding), which
    caused zero-duration step spans and flaky tests on fast runners.
